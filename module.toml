[module]
id            = "code"
display_name  = "Code"
version       = "0.1.2"
description   = "IDE web collaborative — éditeur de code et Git"
author        = "Kubuno Contributors"
license       = "AGPL-3.0"
runtime       = "rust"
settings_path = "/code/settings"

[process]
entrypoint = "kubuno-code"
args       = []

[server]
host = "127.0.0.1"
port = 3112

[routes]
patterns = [
    { method = "*", path = "/*" },
]

[[sidebar_items]]
id       = "code"
label    = "Code"
icon     = "Code2"
path     = "/code"
position = 60
section  = "main"

[events]
subscribed = ["UserDeleted"]
publishes  = []
